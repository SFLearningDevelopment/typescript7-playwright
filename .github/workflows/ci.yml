name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # Step 1 — the type-check gate. Playwright does NOT type-check specs,
      # so this separate step catches type errors fast, before any browser runs.
      - name: Type-check (tsc --noEmit)
        run: npx tsc -p tests/tsconfig.json --noEmit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Step 2 — only runs if the type-check gate passed.
      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
